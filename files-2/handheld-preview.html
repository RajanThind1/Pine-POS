<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pine Handheld</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Pine POS — "The Pass" Theme
   A restaurant runs on paper: tickets, chits, the rail at the
   pass. This theme is built from that material instead of a
   generic dark dashboard — warm ticket-paper surfaces, brass
   and rust ink, a serif display face with real character, and
   monospace numerals everywhere money or a ticket number shows.
   Used by the Handheld and KDS frontends (POS terminal extends
   these same tokens) so every screen in the building reads as
   one product.
   ============================================================ */
:root{
  /* ---- Paper surfaces (front-of-house: Handheld, POS) ---- */
  --bg:#EDE6D6;
  --surface:#F7F2E7;
  --surface-2:#FBF8F1;
  --surface-3:#F0E9D8;
  --border:#D9CCA8;
  --border-soft:#E4D9BB;
  --ink:#2A2113;
  --ink-soft:#6B5D44;
  --ink-faint:#9C8E70;

  --primary:#A8742B;
  --primary-dark:#8A5C1E;
  --primary-soft:rgba(168,116,43,.14);
  --on-accent:#FBF6EC;
  --teal:#3E6B4F;
  --teal-dark:#2E5039;
  --teal-soft:rgba(62,107,79,.14);

  --success:#3E7B4F;
  --success-soft:rgba(62,123,79,.14);
  --warning:#B07A1E;
  --warning-soft:rgba(176,122,30,.14);
  --danger:#B6452C;
  --danger-soft:rgba(182,69,44,.13);
  --violet:#7A5FA8;
  --violet-soft:rgba(122,95,168,.13);

  --shadow-sm:0 1px 2px rgba(40,28,10,.10);
  --shadow-md:0 10px 24px rgba(40,28,10,.14);
  --shadow-lg:0 22px 48px rgba(30,20,8,.22);

  --r-sm:3px;
  --r-md:5px;
  --r-lg:8px;
  --r-xl:14px;

  --font-display:'Fraunces',serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}

*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}
a{color:inherit;}
.hidden{display:none !important;}
:focus-visible{outline:2px solid var(--primary); outline-offset:2px;}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  border:1.5px solid transparent; border-radius:var(--r-md); padding:11px 18px;
  font-size:13.5px; font-weight:700; transition:.12s; white-space:nowrap;
  font-family:var(--font-body);
}
.btn svg{width:16px; height:16px;}
.btn-primary{background:var(--primary); color:var(--on-accent); box-shadow:0 1px 0 rgba(255,255,255,.18) inset, var(--shadow-sm);}
.btn-primary:hover{background:var(--primary-dark);}
.btn-secondary{background:var(--surface-2); color:var(--ink); border-color:var(--border);}
.btn-secondary:hover{background:var(--surface-3);}
.btn-teal{background:var(--teal); color:var(--on-accent);}
.btn-teal:hover{background:var(--teal-dark);}
.btn-danger{background:var(--danger-soft); color:var(--danger);}
.btn-danger:hover{background:var(--danger); color:var(--on-accent);}
.btn-lg{padding:14px 22px; font-size:14.5px;}
.btn-block{width:100%;}
.btn:disabled{opacity:.45; cursor:not-allowed;}

/* ---------- Badges (read like a rubber ticket stamp) ---------- */
.badge{
  display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:3px;
  font-size:11px; font-weight:700; letter-spacing:.03em; font-family:var(--font-mono);
  text-transform:uppercase; border:1px solid transparent;
}
.badge-blue{background:var(--primary-soft); color:var(--primary-dark); border-color:rgba(168,116,43,.25);}
.badge-green{background:var(--success-soft); color:var(--success); border-color:rgba(62,123,79,.25);}
.badge-red{background:var(--danger-soft); color:var(--danger); border-color:rgba(182,69,44,.25);}
.badge-amber{background:var(--warning-soft); color:var(--warning); border-color:rgba(176,122,30,.25);}
.badge-teal{background:var(--teal-soft); color:var(--teal-dark); border-color:rgba(62,107,79,.25);}
.badge-violet{background:var(--violet-soft); color:var(--violet); border-color:rgba(122,95,168,.25);}
.badge-gray{background:var(--surface-3); color:var(--ink-soft); border-color:var(--border-soft);}

/* ---------- Panels / cards ---------- */
.panel{background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--r-lg); box-shadow:var(--shadow-sm);}
.panel-pad{padding:18px;}

/* ---------- Connection badge ---------- */
.conn-badge{
  display:flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px;
  border:1px solid var(--border); background:var(--surface-2); font-size:11px; font-weight:700;
  font-family:var(--font-mono);
  color:var(--ink-soft); text-transform:uppercase; letter-spacing:.04em; transition:.15s;
}
.conn-badge .conn-dot{width:7px; height:7px; border-radius:50%; background:var(--success); box-shadow:0 0 0 3px var(--success-soft);}
.conn-badge.offline{color:var(--danger); border-color:var(--danger);}
.conn-badge.offline .conn-dot{background:var(--danger); box-shadow:0 0 0 3px var(--danger-soft); animation:connPulse 1s infinite;}
@keyframes connPulse{0%,100%{opacity:1} 50%{opacity:.3}}

/* ---------- Toasts ---------- */
#toast-root{position:fixed; bottom:20px; right:20px; z-index:700; display:flex; flex-direction:column; gap:10px; align-items:flex-end;}
.toast-msg{
  background:var(--ink); color:var(--surface-2); border:1px solid var(--ink); padding:13px 20px; border-radius:var(--r-md); font-size:13.5px; font-weight:600;
  box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:10px; animation:toastIn .25s ease;
}
.toast-msg svg{width:16px; height:16px; color:var(--teal-soft); flex-shrink:0;}
@keyframes toastIn{from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:translateY(0)}}

/* ---------- Numpad (used by Handheld login) ---------- */
.numpad{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}
.numkey{background:var(--surface-2); border:1.5px solid var(--border); border-radius:var(--r-md); color:var(--ink); font-family:var(--font-display); font-weight:600; font-size:21px; padding:16px 0; transition:.1s;}
.numkey:active{background:var(--primary-soft); border-color:var(--primary);}
.numkey.action{color:var(--ink-faint); font-size:12.5px; font-weight:600; display:flex; align-items:center; justify-content:center;}
.numkey.action svg{width:15px; height:15px;}
.pin-display{display:flex; gap:10px; justify-content:center; margin:18px 0;}
.pin-dot{width:13px; height:13px; border-radius:50%; border:2px solid var(--border);}
.pin-dot.filled{background:var(--primary); border-color:var(--primary);}
.pin-dot.error{border-color:var(--danger); background:var(--danger);}

/* ---------- Empty state ---------- */
.empty-state{padding:36px 20px; text-align:center; color:var(--ink-faint);}
.empty-state .h3{color:var(--ink-soft); margin-bottom:4px;}
.h3{font-family:var(--font-display); font-weight:600; font-size:16px;}
.muted{color:var(--ink-faint);}
.mono{font-family:var(--font-mono);}

/* ---------- Staff chip (login picker) ---------- */
.staff-chip{
  display:flex; align-items:center; gap:10px; padding:12px; border-radius:var(--r-md);
  background:var(--surface-2); border:1.5px solid var(--border); text-align:left; transition:.12s; width:100%;
}
.staff-chip.active{border-color:var(--primary); background:var(--primary-soft);}
.staff-chip .staff-avatar{width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:600; font-size:13px; color:#fff; flex-shrink:0;}
.staff-chip .name{font-weight:700; font-size:13.5px;}
.staff-chip .role{display:block; font-size:11px; font-weight:500; color:var(--ink-faint); margin-top:1px;}

/* ---------- Bottom sheet ---------- */
.sheet-overlay{position:fixed; inset:0; background:rgba(20,14,4,.45); z-index:600; display:flex; align-items:flex-end; justify-content:center;}
.sheet{
  background:var(--surface-2); border-radius:var(--r-xl) var(--r-xl) 0 0; border:1px solid var(--border-soft); border-bottom:none;
  width:100%; max-width:520px; max-height:92vh; overflow-y:auto; box-shadow:var(--shadow-lg); animation:sheetIn .2s ease;
}
@keyframes sheetIn{from{transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.sheet-head{padding:16px 18px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-soft); position:sticky; top:0; background:var(--surface-2); z-index:1;}
.sheet-body{padding:16px 18px;}
.sheet-foot{padding:14px 18px; border-top:1px solid var(--border-soft); display:flex; gap:10px; position:sticky; bottom:0; background:var(--surface-2);}
.sheet-close{width:34px; height:34px; border-radius:50%; background:var(--surface-3); border:none; color:var(--ink-soft); display:flex; align-items:center; justify-content:center;}
.sheet-close svg{width:16px; height:16px;}

/* ---------- Fields ---------- */
.field{display:flex; flex-direction:column; gap:6px; margin-bottom:12px;}
.field label{font-size:12px; font-weight:700; color:var(--ink-soft);}
.field input, .field select, .field textarea{
  background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r-sm); padding:11px 12px;
  font-size:14px; color:var(--ink); outline:none; transition:.12s;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--primary);}
.field-row{display:flex; gap:10px;}
.field-row .field{flex:1;}

/* ---------- Qty control ---------- */
.qty-btn{width:32px; height:32px; border-radius:50%; border:1.5px solid var(--border); background:var(--surface); color:var(--ink); display:flex; align-items:center; justify-content:center; transition:.1s;}
.qty-btn svg{width:14px; height:14px;}
.qty-btn:hover{border-color:var(--primary); color:var(--primary);}

/* ---------- Modifier options ---------- */
.modopt-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px;}
.modopt{background:var(--surface); color:var(--ink); border:1.5px solid var(--border); border-radius:var(--r-sm); padding:10px 12px; font-size:13px; font-weight:600; display:flex; justify-content:space-between; align-items:center; transition:.1s; text-align:left;}
.modopt.selected{border-color:var(--primary); background:var(--primary-soft); color:var(--primary-dark);}
.modopt .opt-price{font-size:11px; color:var(--ink-faint); font-family:var(--font-mono);}
.modopt.selected .opt-price{color:var(--primary-dark);}
.modgroup-title{display:flex; justify-content:space-between; align-items:center; font-size:12.5px; font-weight:700; margin-bottom:8px; color:var(--ink-soft);}
.modgroup-title .req{font-size:10.5px; color:var(--danger); font-weight:700;}

/* ---------- Tabs ---------- */
.tabbar{display:flex; gap:8px; flex-wrap:wrap;}
.tab{background:var(--surface-2); border:1.5px solid var(--border); color:var(--ink-soft); border-radius:999px; padding:9px 14px; font-size:12.5px; font-weight:700; display:flex; align-items:center; gap:6px; transition:.12s;}
.tab svg{width:14px; height:14px;}
.tab.active{background:var(--primary); border-color:var(--primary); color:var(--on-accent);}

</style>
<style>
html,body{height:100%; overflow:hidden;}
body{font-family:var(--font-body); background:var(--bg); color:var(--ink); font-size:14px;}

/* ---------- Login ---------- */
#login-screen{position:fixed; inset:0; z-index:500;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 600px 300px at 100% 0%, rgba(168,116,43,.10), transparent 60%),
    repeating-linear-gradient(transparent, transparent 38px, rgba(168,116,43,.05) 39px);
  display:flex; flex-direction:column; padding:30px 20px; overflow-y:auto;}
#login-screen .brand{display:flex; align-items:center; gap:10px; margin-bottom:26px;}
#login-screen .brand .logo-badge{width:42px; height:42px; border-radius:6px; background:var(--ink); display:flex; align-items:center; justify-content:center; color:var(--surface-2); font-family:var(--font-display); font-weight:600; font-size:16px; box-shadow:var(--shadow-sm);}
#login-screen .brand .title{font-family:var(--font-display); font-weight:600; font-size:18px;}
#login-screen .brand .sub{font-size:11.5px; color:var(--ink-faint); font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.04em;}
#login-screen h1{font-family:var(--font-display); font-size:26px; font-weight:600; margin-bottom:4px; letter-spacing:-.01em;}
#login-screen .lead{font-size:13px; color:var(--ink-faint); margin-bottom:20px;}
#staff-picker{display:flex; flex-direction:column; gap:8px; margin-bottom:18px;}
#login-error{color:var(--danger); font-size:12.5px; font-weight:700; min-height:18px; text-align:center; margin-bottom:6px;}
#login-screen .login-foot{margin-top:auto; text-align:center; font-size:11px; color:var(--ink-faint); padding-top:14px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.04em;}

.online-orders-panel{margin-top:18px; background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--r-lg); padding:14px 16px; box-shadow:var(--shadow-sm);}
.oop-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
.oop-head .h3{font-size:14px;}
.oop-empty{display:flex; align-items:center; gap:8px; color:var(--ink-faint); font-size:12.5px;}
.oop-empty svg{width:15px; height:15px; color:var(--success); flex-shrink:0;}
.online-orders-grid{display:flex; flex-direction:column; gap:8px;}
.online-order-card{background:var(--surface-2); border:1px solid var(--border-soft); border-radius:var(--r-md); padding:10px 12px;}
.online-order-card .ooc-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
.online-order-card .ooc-time{font-size:11px; color:var(--ink-faint); font-family:var(--font-mono);}
.online-order-card .ooc-customer{font-weight:700; font-size:13px;}
.online-order-card .ooc-meta{font-size:11.5px; color:var(--ink-soft); margin-top:2px;}
.platform-badge{font-size:10px; font-weight:800; padding:3px 8px; border-radius:3px; text-transform:uppercase; letter-spacing:.03em; font-family:var(--font-mono);}

/* ---------- App shell ---------- */
#app{display:none; flex-direction:column; height:100vh;}
#app.active{display:flex;}
.hh-header{
  display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 16px;
  background:var(--surface); border-bottom:1.5px solid var(--ink); flex-shrink:0;
}
.hh-header .left{display:flex; align-items:center; gap:10px; min-width:0;}
.hh-header .logo-badge{width:36px; height:36px; border-radius:6px; background:var(--ink); display:flex; align-items:center; justify-content:center; color:var(--surface-2); font-family:var(--font-display); font-weight:600; font-size:13px; flex-shrink:0;}
.hh-header .title{font-family:var(--font-display); font-weight:600; font-size:17px;}
.hh-header .sub{font-size:11px; color:var(--ink-faint);}
.hh-header .right{display:flex; align-items:center; gap:8px; flex-shrink:0;}
.hh-clockbtn{width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:var(--surface-2); color:var(--ink-soft); display:flex; align-items:center; justify-content:center;}
.hh-clockbtn.off{border-color:var(--warning); color:var(--warning); background:var(--warning-soft);}
.hh-clockbtn svg{width:16px; height:16px;}
.hh-avatar{width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:600; font-size:12.5px; color:#fff; box-shadow:inset 0 0 0 2px rgba(255,255,255,.25);}

.hh-main{flex:1; overflow-y:auto; padding:14px 14px 90px;}
.bottom-nav{
  display:flex; border-top:1.5px solid var(--ink); background:var(--surface); flex-shrink:0;
  position:fixed; bottom:0; left:0; right:0; padding-bottom:env(safe-area-inset-bottom);
}
.bottom-nav .nav-item{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 0 8px;
  color:var(--ink-faint); font-size:10px; font-weight:700; position:relative;
  font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.02em;
}
.bottom-nav .nav-item.active{color:var(--primary-dark);}
.bottom-nav .nav-item svg{width:20px; height:20px;}
.bottom-nav .nav-badge{position:absolute; top:5px; right:calc(50% - 18px); background:var(--danger); color:var(--on-accent); font-size:9px; font-weight:800; border-radius:8px; min-width:15px; height:15px; display:flex; align-items:center; justify-content:center; padding:0 3px;}

/* ---------- Section headers ---------- */
.hh-section{margin-bottom:18px;}
.hh-section-title{font-family:var(--font-mono); font-weight:700; font-size:11.5px; color:var(--ink-soft); margin-bottom:8px; text-transform:uppercase; letter-spacing:.06em;}

/* ---------- Tables ---------- */
.hh-table-row{
  width:100%; display:flex; align-items:center; gap:12px; padding:13px; border-radius:var(--r-md);
  background:var(--surface); border:1.5px solid var(--border-soft); margin-bottom:8px; text-align:left; transition:.1s;
}
.hh-table-row.status-occupied{border-color:var(--primary); background:var(--primary-soft);}
.hh-table-row.status-check{border-color:var(--warning); background:var(--warning-soft);}
.hh-table-row.status-dirty{border-color:var(--ink-faint); background:var(--surface-3);}
.hh-table-num{font-family:var(--font-display); font-weight:600; font-size:19px; width:34px; flex-shrink:0;}
.hh-table-info{flex:1; min-width:0;}
.hh-table-meta{font-size:11.5px; color:var(--ink-faint); font-weight:700;}
.hh-table-sub{font-size:11px; margin-top:2px;}
.hh-table-amt{font-family:var(--font-mono); font-weight:800; font-size:13px; margin-left:8px;}

/* ---------- Order: ticket list (looks like a torn order chit) ---------- */
.ticket-row{
  width:100%; display:flex; align-items:center; gap:12px; padding:14px; border-radius:var(--r-md);
  background:var(--surface); border:1px solid var(--border-soft); border-left:3px solid var(--primary);
  margin-bottom:8px; text-align:left;
}
.ticket-row .tag{width:34px; height:34px; border-radius:var(--r-sm); background:var(--surface-3); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-weight:800; font-size:12px; flex-shrink:0;}
.ticket-row .mid{flex:1; min-width:0;}
.ticket-row .mid .name{font-weight:700; font-size:13.5px;}
.ticket-row .mid .sub{font-size:11.5px; color:var(--ink-faint); margin-top:1px;}
.ticket-row .amt{font-family:var(--font-mono); font-weight:800; font-size:14px;}

/* ---------- Order: menu ---------- */
.hh-order-head{display:flex; align-items:center; gap:12px; margin-bottom:12px;}
.btn-back{width:34px; height:34px; border-radius:50%; background:var(--surface-2); border:1px solid var(--border); color:var(--ink); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.btn-back svg{width:16px; height:16px;}
.cat-chips{display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; margin-bottom:8px; scrollbar-width:none;}
.cat-chips::-webkit-scrollbar{display:none;}
.cat-chip{flex-shrink:0; background:var(--surface-2); border:1.5px solid var(--border); color:var(--ink-soft); border-radius:999px; padding:9px 14px; font-size:12.5px; font-weight:700; white-space:nowrap;}
.cat-chip.active{background:var(--primary); border-color:var(--primary); color:var(--on-accent);}
.menu-grid-2col{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.menu-item-2col{background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--r-md); padding:12px; text-align:left; display:flex; flex-direction:column; gap:6px; min-height:88px;}
.menu-item-2col.unavailable{opacity:.4;}
.menu-item-2col .icon{font-size:24px;}
.menu-item-2col .name{font-weight:700; font-size:12.5px; line-height:1.3;}
.menu-item-2col .price{font-family:var(--font-mono); color:var(--primary-dark); font-weight:700; font-size:12.5px; margin-top:auto;}

/* ---------- Cart bar ---------- */
.cart-bar{
  position:fixed; left:14px; right:14px; bottom:74px; z-index:50; background:var(--ink); color:var(--surface-2);
  border-radius:var(--r-md); padding:13px 16px; display:flex; justify-content:space-between; align-items:center;
  font-weight:700; font-size:13.5px; box-shadow:var(--shadow-lg);
}

/* ---------- Cart lines ---------- */
.cart-line{padding:12px 0; border-bottom:1px dashed var(--border-soft);}
.cart-line .top{display:flex; justify-content:space-between; gap:8px;}
.cart-line .name{font-weight:700; font-size:13.5px;}
.cart-line .price{font-family:var(--font-mono); font-weight:700; font-size:13.5px;}
.cart-line .mods{font-size:11.5px; color:var(--ink-faint); margin-top:3px;}
.cart-line .notes{font-size:11.5px; color:var(--danger); font-weight:700; margin-top:3px;}
.cart-line .ctrl{display:flex; justify-content:space-between; align-items:center; margin-top:8px;}
.cart-line .qty-ctrl{display:flex; align-items:center; gap:8px;}
.cart-line .qty-ctrl .num{font-family:var(--font-mono); font-weight:700; min-width:18px; text-align:center;}
.status-pill{font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; padding:3px 8px; border-radius:3px; font-family:var(--font-mono);}
.status-pill.status-new{background:var(--surface-3); color:var(--ink-soft);}
.status-pill.status-fired{background:var(--warning-soft); color:var(--warning);}
.status-pill.status-ready{background:var(--teal-soft); color:var(--teal-dark);}
.status-pill.status-served{background:var(--success-soft); color:var(--success);}

.cart-totals{margin-top:6px;}
.cart-totals .row{display:flex; justify-content:space-between; font-size:13px; padding:5px 0; color:var(--ink-soft); font-family:var(--font-mono);}
.cart-totals .row.total{font-weight:800; font-size:16px; color:var(--ink); padding-top:10px; border-top:1px solid var(--border-soft); margin-top:4px; font-family:var(--font-display);}

/* ---------- Kitchen ticket cards (handheld, single column) ---------- */
.hh-ticket{background:var(--surface); border:1.5px solid var(--border-soft); border-radius:var(--r-lg); margin-bottom:14px; overflow:hidden; box-shadow:var(--shadow-sm);}
.hh-ticket.warn{border-color:var(--warning);}
.hh-ticket.late{border-color:var(--danger);}
.hh-ticket .head{padding:12px 14px; display:flex; justify-content:space-between; align-items:center; background:var(--surface-3); border-bottom:1px dashed var(--border);}
.hh-ticket .head .tname{font-family:var(--font-display); font-weight:600; font-size:17px;}
.hh-ticket .head .tno{font-size:11px; color:var(--ink-faint); font-weight:700; font-family:var(--font-mono);}
.hh-ticket .timer{font-family:var(--font-mono); font-weight:800; font-size:14px; padding:5px 10px; border-radius:3px;}
.hh-ticket .timer.ok{color:var(--success); background:var(--success-soft);}
.hh-ticket .timer.warn{color:var(--warning); background:var(--warning-soft);}
.hh-ticket .timer.late{color:var(--danger); background:var(--danger-soft);}
.hh-ticket .items{padding:10px 14px; display:flex; flex-direction:column; gap:10px;}
.hh-ticket .item{display:flex; gap:10px; align-items:flex-start; font-size:13.5px;}
.hh-ticket .item .q{font-family:var(--font-mono); font-weight:800; color:var(--primary-dark); min-width:24px;}
.hh-ticket .item .body{flex:1;}
.hh-ticket .item .nm{font-weight:700;}
.hh-ticket .item .mods{font-size:11.5px; color:var(--ink-faint); margin-top:2px;}
.hh-ticket .item .nts{font-size:11.5px; color:var(--danger); font-weight:700; margin-top:2px;}
.hh-ticket .item.ready .body{text-decoration:line-through; opacity:.5;}
.hh-ticket .foot{padding:12px 14px; border-top:1px solid var(--border-soft);}

/* ---------- KPI grid ---------- */
.kpi-2x2{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
.kpi-tile{background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--r-md); padding:14px; box-shadow:var(--shadow-sm);}
.kpi-tile .lbl{font-size:11px; color:var(--ink-faint); font-weight:700; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.03em;}
.kpi-tile .val{font-family:var(--font-display); font-weight:600; font-size:21px; margin-top:4px;}

/* ---------- Misc ---------- */
.empty-state{padding:40px 16px; text-align:center; color:var(--ink-faint);}
.color-dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px;}
</style>
</head>

<script>
const $ = (sel,el=document)=>el.querySelector(sel);
const $$ = (sel,el=document)=>[...el.querySelectorAll(sel)];
const money = (n)=> (n<0?'-':'') + '$' + Math.abs(n).toFixed(2);
function fmtTime(ts){ return new Date(ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function fmtElapsed(ts){
  const mins = Math.max(0, Math.floor((Date.now()-ts)/60000));
  const h = Math.floor(mins/60), m = mins%60;
  return h>0 ? `${h}h ${m}m` : `${m}m`;
}

/* ============================================================
   ONLINE ORDERS — shown on the login screen so anyone walking by
   can see what's come in from delivery apps or the website, even
   before clocking in.
   ============================================================ */
const ONLINE_PLATFORMS = {
  doordash: {label:'DoorDash', color:'#FF3008'},
  grubhub:  {label:'Grubhub',  color:'#FF8000'},
  ubereats: {label:'Uber Eats', color:'#06C167'},
  website:  {label:'Website',  color:'#FF7A3D'},
};
function renderOnlineOrdersPanel(){
  const el = $('#online-orders-panel');
  if(!el) return;
  const orders = Object.values(STATE.orders||{}).filter(o=>o.status==='open' && o.platform).sort((a,b)=>a.openedAt-b.openedAt);
  if(!orders.length){
    el.innerHTML = `
      <div class="oop-head"><div class="h3">Online Orders</div></div>
      <div class="oop-empty">${ICONS.checkCircle} No online orders waiting — all caught up.</div>
    `;
    return;
  }
  el.innerHTML = `
    <div class="oop-head">
      <div class="h3">Online Orders</div>
      <span class="badge badge-blue">${orders.length} new</span>
    </div>
    <div class="online-orders-grid">
      ${orders.map(o=>{
        const p = ONLINE_PLATFORMS[o.platform] || {label:o.platform, color:'var(--ink-faint)'};
        const totals = orderTotals(o);
        const itemCount = o.items.reduce((s,it)=>s+it.qty,0);
        return `<div class="online-order-card">
          <div class="ooc-top">
            <span class="platform-badge" style="background:${p.color}22; color:${p.color};">${p.label}</span>
            <span class="ooc-time">${fmtElapsed(o.openedAt)} ago</span>
          </div>
          <div class="ooc-customer">${o.customerName||'Guest'}</div>
          <div class="ooc-meta">${itemCount} item${itemCount===1?'':'s'} · ${money(totals.total)}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}
function initials(name){ return name.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase(); }
function dayStart(d=new Date()){ const x=new Date(d); x.setHours(0,0,0,0); return x.getTime(); }

let STATE = {
  restaurant:{name:'Pine', taxRate:0, tipPresets:[0.18,0.20,0.25], sections:[]},
  currentStaff:null, staff:[], menu:{categories:[],items:[]}, modifierGroups:{},
  tables:[], orders:{}, completedOrders:[], inventory:[], customers:[], tipOuts:[], notifications:[],
  nextUid:1, nextOrderId:1,
};
let pinBuffer='';
let view='tables';
let currentOrderId=null;
let activeMenuCat=null;
let activeStation='All';
let mySalesRange='today';

/* ---------- ported data helpers ---------- */
const uid = ()=> 'u'+(STATE.nextUid++);
function findMenuItem(id){ return STATE.menu.items.find(i=>i.id===id); }
function findCategory(id){ return STATE.menu.categories.find(c=>c.id===id); }
function findModGroup(key){ return STATE.modifierGroups[key]; }
function buildOrderItem(menuId, qty, modSelections, notes, status, firedAgoMs){
  const mi = findMenuItem(menuId);
  let modPrice = 0; const mods=[];
  (modSelections||[]).forEach(sel=>{
    const grp = findModGroup(sel.group);
    (sel.choices||[sel.choice]).forEach(choiceName=>{
      const opt = grp.options.find(o=>o.name===choiceName);
      if(opt){ modPrice += opt.price; mods.push({group:grp.name, name:opt.name, price:opt.price}); }
    });
  });
  return {uid:uid(), menuItemId:menuId, name:mi.name, icon:mi.icon, basePrice:mi.price, modPrice, qty:qty||1, mods, notes:notes||'', station:findCategory(mi.category).station, status:status||'new', firedAt: firedAgoMs!=null?Date.now()-firedAgoMs:null};
}
function lineTotal(it){ return (it.basePrice+it.modPrice)*it.qty; }
function orderTotals(o){
  const subtotal = o.items.reduce((s,it)=>s+lineTotal(it),0);
  const discount = o.discount||0;
  const taxable = Math.max(0, subtotal-discount);
  const tax = taxable*STATE.restaurant.taxRate;
  const tip = o.tip||0;
  return {subtotal, discount, tax, tip, total: taxable+tax+tip};
}
function getTable(id){ return STATE.tables.find(t=>t.id===id); }
function tableLabel(id){ const t=getTable(id); return t? t.number : ''; }
function getOrder(id){ return STATE.orders[id]; }
function countNew(o){ return o.items.filter(i=>i.status==='new').length; }

const DEPARTMENTS = ['Food','Beer','Liquor','Beverage','Open Items'];
const DEPT_COLORS = {Food:'#FF9F6B', Beer:'#F2C14E', Liquor:'#B79CFF', Beverage:'#34C9AC', 'Open Items':'#8C8276'};
const FOOD_CATEGORIES = ['starters','salads','sandwiches','entrees','pizza','desserts'];
function departmentForItem(it){
  const cat = it.category;
  if(cat==='cocktails') return /beer/i.test(it.name) ? 'Beer' : 'Liquor';
  if(cat==='beverages') return 'Beverage';
  if(FOOD_CATEGORIES.includes(cat)) return 'Food';
  return 'Open Items';
}
function shiftSalesByDept(staffMember){
  const since = staffMember.clockInTime || 0;
  const orders = STATE.completedOrders.filter(o=>o.server===staffMember.name && o.ts>=since);
  const byDept = {}; DEPARTMENTS.forEach(d=>byDept[d]=0);
  let totalTips=0, totalSales=0;
  orders.forEach(o=>{
    totalTips += o.tip||0; totalSales += o.total||0;
    o.items.forEach(it=>{ byDept[departmentForItem(it)] += it.price*it.qty; });
  });
  return {byDept, totalTips, totalSales, orderCount: orders.length};
}

/* ---------- toast ---------- */
function toast(msg, icon=ICONS.checkCircle){
  const root = $('#toast-root');
  const el = document.createElement('div');
  el.className='toast-msg';
  el.innerHTML = icon + '<span>'+msg+'</span>';
  root.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(8px)'; el.style.transition='.25s'; setTimeout(()=>el.remove(),250); }, 2400);
}

/* ---------- sheets ---------- */
function showSheet(html){
  $('#sheet-root').innerHTML = `<div class="sheet-overlay" data-action="closeSheet"><div class="sheet" data-action="stop">${html}</div></div>`;
}
function closeSheet(){ $('#sheet-root').innerHTML=''; }

/* ============================================================
   LOGIN
   ============================================================ */
function renderLogin(){
  $('#login-restaurant').textContent = STATE.restaurant.name||'';
  renderOnlineOrdersPanel();
  $('#numpad').innerHTML = ['1','2','3','4','5','6','7','8','9','clear','0','del'].map(k=>{
    if(k==='clear') return `<button class="numkey action" data-action="pinKey" data-key="clear">Clear</button>`;
    if(k==='del') return `<button class="numkey action" data-action="pinKey" data-key="del">${ICONS.close}</button>`;
    return `<button class="numkey" data-action="pinKey" data-key="${k}">${k}</button>`;
  }).join('');
  renderPinDisplay();
}
function renderPinDisplay(){
  $('#pin-display').innerHTML = [0,1,2,3].map(i=>`<div class="pin-dot ${i<pinBuffer.length?'filled':''}"></div>`).join('');
}
function pinKey(key){
  if(key==='clear') pinBuffer='';
  else if(key==='del') pinBuffer=pinBuffer.slice(0,-1);
  else if(pinBuffer.length<4) pinBuffer+=key;
  renderPinDisplay();
  if(pinBuffer.length===4){
    const staff = STATE.staff.find(s=>s.pin===pinBuffer);
    if(staff){
      const prevClockIn = staff.clockInTime || 0;
      if(!staff.clockedIn){ staff.clockedIn=true; staff.clockInTime=Date.now(); }
      STATE.currentStaff=staff; pinBuffer=''; $('#login-error').textContent='';
      enterApp();
      notifyIncomingTipOuts(staff, prevClockIn);
      PineSync.push(STATE);
    } else {
      $('#login-error').textContent='Incorrect PIN. Try again.';
      $$('.pin-dot').forEach(d=>d.classList.add('error'));
      setTimeout(()=>{ pinBuffer=''; renderPinDisplay(); $('#login-error').textContent=''; }, 500);
    }
  }
}
function notifyIncomingTipOuts(staff, since){
  if(!since) return;
  const received = STATE.tipOuts.filter(t=>t.toId===staff.id && t.ts>=since);
  if(!received.length) return;
  const total = received.reduce((sum,t)=>sum+t.amount,0);
  const fromNames = [...new Set(received.map(t=>t.from))];
  const msg = received.length===1
    ? `You were tipped out ${money(total)} by ${fromNames[0]}`
    : `You were tipped out ${money(total)} from ${fromNames.length} teammate${fromNames.length===1?'':'s'}`;
  setTimeout(()=>toast(msg, ICONS.checkCircle), 600);
}
function enterApp(){
  localStorage.setItem('pine-hh-staff-id', STATE.currentStaff.id);
  $('#login-screen').classList.add('hidden');
  $('#app').classList.add('active');
  const tabs = tabsForRole(STATE.currentStaff.role);
  view = tabs[0].id;
  renderApp();
  setInterval(()=>{ if(view==='kitchen'||view==='tables') renderApp(); }, 15000);
}
function logout(){
  localStorage.removeItem('pine-hh-staff-id');
  STATE.currentStaff=null; pinBuffer='';
  $('#app').classList.remove('active');
  $('#login-screen').classList.remove('hidden');
  renderLogin();
}

/* ============================================================
   APP SHELL / NAV
   ============================================================ */
const TABS_FULL = [
  {id:'tables', label:'Tables', icon:'tables'},
  {id:'order', label:'Order', icon:'order'},
  {id:'kitchen', label:'Kitchen', icon:'kitchen'},
  {id:'mysales', label:'My Sales', icon:'cash'},
];
const TABS_KITCHEN = [
  {id:'tables', label:'Tables', icon:'tables'},
  {id:'kitchen', label:'Kitchen', icon:'kitchen'},
  {id:'mysales', label:'My Sales', icon:'cash'},
];
function tabsForRole(role){ return (role==='Cook'||role==='Food Runner'||role==='Busser') ? TABS_KITCHEN : TABS_FULL; }

const TITLES = {tables:'Tables', order:'Order', kitchen:'Kitchen', mysales:'My Sales'};

function renderApp(){
  if(!STATE.currentStaff) return;
  const me = STATE.currentStaff;
  $('#hh-title').textContent = view==='order' && currentOrderId ? '' : TITLES[view];
  $('#hh-sub').textContent = STATE.restaurant.name;
  $('#hh-avatar').style.background = me.color;
  $('#hh-avatar').textContent = initials(me.name);
  const cob = $('#clockout-btn');
  cob.innerHTML = me.clockedIn ? ICONS.clock : ICONS.checkCircle;
  cob.classList.toggle('off', !me.clockedIn);
  cob.title = me.clockedIn ? 'Clock out' : 'Clock in';

  const tabs = tabsForRole(me.role);
  if(!tabs.find(t=>t.id===view)) view = tabs[0].id;
  $('#bottom-nav').innerHTML = tabs.map(t=>{
    let badge = '';
    if(t.id==='kitchen'){
      const n = Object.values(STATE.orders).filter(o=>o.status==='open' && o.items.some(it=>it.status==='fired'||it.status==='ready')).length;
      if(n>0) badge = `<span class="nav-badge">${n}</span>`;
    }
    return `<button class="nav-item ${view===t.id?'active':''}" data-action="goTab" data-tab="${t.id}">${badge}${ICONS[t.icon]}<span>${t.label}</span></button>`;
  }).join('');

  const renderers = {tables:renderTables, order:renderOrderView, kitchen:renderKitchenView, mysales:renderMySales};
  $('#hh-main').innerHTML = renderers[view] ? renderers[view]() : '';
  $('#cart-bar-slot').innerHTML = renderCartBar();
}

/* ============================================================
   VIEW: TABLES
   ============================================================ */
function renderTables(){
  const sections = STATE.restaurant.sections;
  return sections.map(sec=>{
    const tables = STATE.tables.filter(t=>t.section===sec);
    return `<div class="hh-section">
      <div class="hh-section-title">${sec}</div>
      ${tables.map(t=>tableRow(t)).join('')}
    </div>`;
  }).join('');
}
function tableRow(t){
  const o = t.orderId? getOrder(t.orderId): null;
  const meta = {available:{label:'Available',cls:'badge-green'}, occupied:{label:'Occupied',cls:'badge-blue'}, check:{label:'Check',cls:'badge-amber'}, dirty:{label:'Needs bussing',cls:'badge-gray'}}[t.status];
  let amt='';
  if(o){ amt = `<div class="hh-table-amt">${money(orderTotals(o).total)}</div>`; }
  return `<button class="hh-table-row status-${t.status}" data-action="openTable" data-id="${t.id}">
    <div class="hh-table-num">${t.number}</div>
    <div class="hh-table-info">
      <div class="hh-table-meta">${t.seats} seat${t.seats===1?'':'s'}</div>
      ${o?`<div class="hh-table-sub muted">${(o.server||'').split(' ')[0]} · opened ${fmtElapsed(o.openedAt)} ago</div>`:''}

function completePayment(){
  const o = getOrder(currentOrderId);
  const ps = payState;
  const subtotal = o.items.reduce((s,it)=>s+lineTotal(it),0);
  const taxable = Math.max(0, subtotal-(o.discount||0));
  const tax = taxable*STATE.restaurant.taxRate;
  const tip = ps.tipMode==='pct'? taxable*ps.tipPct : (ps.tipMode==='custom'? ps.tipAmt : 0);

  STATE.completedOrders.push({

    items:o.items.map(it=>({name:it.name, category:findMenuItem(it.menuItemId).category, qty:it.qty, price:it.basePrice+it.modPrice})),

  delete STATE.orders[o.id];
  closeSheet();
  toast('Payment of '+money(total)+' complete');
  currentOrderId=null; view='tables';
  renderApp(); PineSync.push(STATE);
}

/* ============================================================
   VIEW: KITCHEN
   ============================================================ */
function renderKitchenView(){
  const stations = ['All', ...new Set(STATE.menu.categories.map(c=>c.station))];
  if(!stations.includes(activeStation)) activeStation='All';
  let tickets = Object.values(STATE.orders)
    .filter(o=>o.status==='open' && o.items.some(it=>it.status==='fired'||it.status==='ready'))
    .map(o=>{
      const items = o.items.filter(it=>(it.status==='fired'||it.status==='ready') && (activeStation==='All'||it.station===activeStation));
      const fired = o.items.filter(it=>it.firedAt).map(it=>it.firedAt);
      return {order:o, items, earliestFired: fired.length?Math.min(...fired):Date.now()};
    })
    .filter(t=>t.items.length>0);
  tickets.sort((a,b)=>a.earliestFired-b.earliestFired);

  return `
    <div class="cat-chips">${stations.map(s=>`<button class="cat-chip ${activeStation===s?'active':''}" data-action="setStation" data-station="${s}">${s}</button>`).join('')}</div>
    ${tickets.length? tickets.map(t=>kdsCard(t)).join('') : `<div class="empty-state">${ICONS.kitchen}<div class="h3">All caught up</div><div style="font-size:12.5px; margin-top:4px;">No tickets waiting${activeStation==='All'?'':' on '+activeStation}.</div></div>`}
  `;
}
function kdsCard(t){
  const o = t.order;
  const mins = Math.floor((Date.now()-t.earliestFired)/60000);
  let urgency='ok'; if(mins>=12) urgency='late'; else if(mins>=8) urgency='warn';
  const label = o.tableId? 'Table '+tableLabel(o.tableId) : 'Takeout · '+(o.customerName||'Guest');
  return `<div class="hh-ticket ${urgency!=='ok'?urgency:''}">
    <div class="head">
      <div><div class="tname">${label}</div><div class="tno">#${o.id} · ${o.type==='takeout'?'TAKEOUT':(o.server||'').split(' ')[0]}</div></div>
      <div class="timer ${urgency}">${mins}m</div>
    </div>
    <div class="items">
      ${t.items.map(it=>{
        const modsText = it.mods.map(m=>m.name).join(', ');
        return `<div class="item ${it.status==='ready'?'ready':''}">
          <div class="q">${it.qty}×</div>
          <div class="body"><div class="nm">${it.name}</div>${modsText?`<div class="mods">${modsText}</div>`:''}${it.notes?`<div class="nts">${it.notes}</div>`:''}</div>
          ${it.status==='fired'?`<button class="btn btn-secondary" style="padding:8px 12px; font-size:12px;" data-action="bumpItem" data-order-id="${o.id}" data-uid="${it.uid}">Ready</button>`:`<span class="badge badge-green">Ready</span>`}
        </div>`;
      }).join('')}
    </div>
    <div class="foot"><button class="btn btn-teal btn-block" data-action="bumpTicket" data-order-id="${o.id}">${ICONS.check} Bump All &amp; Serve</button></div>
  </div>`;
}
function bumpItem(orderId, uidStr){
  const o = getOrder(orderId); const it = o.items.find(i=>i.uid===uidStr);
  it.status='ready'; renderApp(); PineSync.push(STATE);
}
function bumpTicket(orderId){
  const o = getOrder(orderId);
  o.items.forEach(it=>{ if(it.status==='fired'||it.status==='ready') it.status='served'; });
  toast('Ticket #'+orderId+' bumped and served');
  renderApp(); PineSync.push(STATE);
}

/* ============================================================
   VIEW: MY SALES + CLOCK OUT
   ============================================================ */
function renderMySales(){
  const me = STATE.currentStaff;
  const mine = STATE.completedOrders.filter(o=>o.server===me.name);
  const cutoff = mySalesRange==='today' ? dayStart(new Date()) : dayStart(new Date(Date.now()-6*86400000));
  const orders = mine.filter(o=>o.ts>=cutoff);
  const sorted = [...orders].sort((a,b)=>b.ts-a.ts);
  const totalSales = orders.reduce((s,o)=>s+o.total,0);
  const totalTips = orders.reduce((s,o)=>s+(o.tip||0),0);
  const tipPct = orders.length? (orders.reduce((s,o)=>s+(o.subtotal? o.tip/o.subtotal:0),0)/orders.length)*100 : 0;
  const isTipped = (me.role==='Server'||me.role==='Bartender');
  const tipOutsReceived = STATE.tipOuts.filter(t=>t.toId===me.id && t.ts>=cutoff).sort((a,b)=>b.ts-a.ts);
  const tipOutsGiven = STATE.tipOuts.filter(t=>t.fromId===me.id && t.ts>=cutoff).sort((a,b)=>b.ts-a.ts);

  return `
    <div class="kpi-2x2">
      <div class="kpi-tile"><div class="lbl">My Sales</div><div class="val">${money(totalSales)}</div></div>
      <div class="kpi-tile"><div class="lbl">My Tips</div><div class="val">${money(totalTips)}</div></div>
      <div class="kpi-tile"><div class="lbl">Orders Served</div><div class="val">${orders.length}</div></div>
      <div class="kpi-tile"><div class="lbl">Avg Tip %</div><div class="val">${tipPct.toFixed(1)}%</div></div>
    </div>
    <div class="tabbar" style="margin-bottom:12px;">
      <button class="tab ${mySalesRange==='today'?'active':''}" data-action="setMySalesRange" data-range="today">Today</button>
      <button class="tab ${mySalesRange==='week'?'active':''}" data-action="setMySalesRange" data-range="week">Last 7 Days</button>
    </div>
    <div class="hh-section-title">My Orders</div>
    ${sorted.length? sorted.map(o=>`
      <div class="cart-line">
        <div class="top"><div class="name">#${o.id} · ${fmtTime(o.ts)}</div><div class="price">${money(o.total)}</div></div>
        <div class="mods">${o.items.length} item${o.items.length===1?'':'s'} · Tip ${money(o.tip)} · ${o.paymentMethod==='card'?'Card':'Cash'}</div>
      </div>`).join('') : `<div class="empty-state" style="padding:24px;">No orders yet</div>`}
    ${isTipped?`
    <div class="hh-section-title" style="margin-top:18px;">Tip-Outs Given</div>
    ${tipOutsGiven.length? tipOutsGiven.map(t=>`<div class="cart-line"><div class="top"><div class="name">To ${t.to}</div><div class="price">${money(t.amount)}</div></div><div class="mods">${fmtTime(t.ts)}</div></div>`).join('') : `<div class="empty-state" style="padding:18px;">None yet</div>`}
    `:''}
    <div class="hh-section-title" style="margin-top:18px;">Tip-Outs Received</div>
    ${tipOutsReceived.length? tipOutsReceived.map(t=>`<div class="cart-line"><div class="top"><div class="name">From ${t.from}</div><div class="price" style="color:var(--success)">${money(t.amount)}</div></div><div class="mods">${fmtTime(t.ts)}</div></div>`).join('') : `<div class="empty-state" style="padding:18px;">None yet</div>`}
  `;
}

/* ---- Clock out sheet ---- */
function openClockOut(){
  const s = STATE.currentStaff;
  if(!s.clockedIn){
    s.clockedIn=true; s.clockInTime=Date.now();
    toast(s.name+' clocked in');
    renderApp(); PineSync.push(STATE);
    return;
  }
  const {byDept, totalTips, totalSales, orderCount} = shiftSalesByDept(s);
  const gross = DEPARTMENTS.reduce((sum,d)=>sum+byDept[d],0);
  const shiftLen = s.clockInTime? fmtElapsed(s.clockInTime) : '—';
  const isTipped = (s.role==='Server'||s.role==='Bartender');
  const eligible = STATE.staff.filter(m=>m.clockedIn && m.id!==s.id && m.role!=='Manager' && m.role!=='Cook');

  showSheet(`
    <div class="sheet-head"><div class="h3">Clock Out — ${s.name}</div><button class="sheet-close" data-action="closeSheet">${ICONS.close}</button></div>
    <div class="sheet-body">
      <div class="panel panel-pad" style="background:var(--surface-2); margin-bottom:14px;">
        <div class="cart-totals" style="margin-top:0;">
          <div class="row"><span class="muted">Shift Length</span><span class="mono">${shiftLen}</span></div>
          <div class="row"><span class="muted">Orders Served</span><span class="mono">${orderCount}</span></div>
          <div class="row total"><span>Total Sales</span><span class="mono">${money(totalSales)}</span></div>
          ${isTipped?`<div class="row"><span class="muted">Tips Earned</span><span class="mono" style="color:var(--success); font-weight:800;">${money(totalTips)}</span></div>`:''}
        </div>
      </div>
      <div class="h3" style="font-size:12.5px; margin-bottom:8px;">Sales by Department</div>
      ${DEPARTMENTS.map(d=>`
        <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px;">
          <span><span class="color-dot" style="background:${DEPT_COLORS[d]}"></span>${d}</span><span class="mono">${money(byDept[d])}</span>
        </div>
        <div style="height:6px; border-radius:4px; background:var(--surface-3); margin-bottom:10px; overflow:hidden;"><div style="height:100%; width:${gross?(byDept[d]/gross*100):0}%; background:${DEPT_COLORS[d]}"></div></div>
      `).join('')}
      ${isTipped?`
        <div class="h3" style="font-size:12.5px; margin:16px 0 4px;">Tip Out to Teammates (optional)</div>
        <div class="muted" style="font-size:11.5px; margin-bottom:10px;">If a guest left cash for the team, check who was on shift with you and send them a share — directly to that person.</div>
        ${eligible.length? `
        <div style="display:flex; gap:8px; margin-bottom:12px;">
          <button class="btn btn-secondary" style="flex:1; font-size:12px; padding:9px 10px;" data-action="splitTipEvenly">${ICONS.plus} Split Evenly</button>
          <button class="btn btn-secondary" style="flex:1; font-size:12px; padding:9px 10px;" data-action="clearTipOuts">Clear</button>
        </div>
        ${eligible.map(m=>`
          <div class="cart-line" style="display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0;">
            <label style="display:flex; align-items:center; gap:10px; flex:1; min-width:0; cursor:pointer;">
              <input type="checkbox" class="tipout-check" data-recipient-id="${m.id}" data-change="recalcTipOutSummary" style="width:18px; height:18px; accent-color:var(--primary); flex-shrink:0;">
              <div class="staff-avatar" style="background:${m.color}; width:30px; height:30px; font-size:11px; flex-shrink:0;">${initials(m.name)}</div>
              <div style="min-width:0;"><div class="name" style="font-size:13px;">${m.name}</div><div class="mods">${m.role}</div></div>
            </label>
            <div style="display:flex; align-items:center; gap:4px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:var(--r-sm); padding:6px 10px;">
              <span class="mono" style="font-size:13px; color:var(--ink-faint);">$</span>
              <input type="number" class="tipout-amount" data-recipient-id="${m.id}" data-change="recalcTipOutSummary" min="0" step="0.01" placeholder="0.00" style="width:56px; border:none; background:none; color:var(--ink); font-family:var(--font-mono); font-size:13px; outline:none; text-align:right;">
            </div>
          </div>`).join('')}
        <div id="tipout-summary" style="display:flex; justify-content:space-between; align-items:center; padding:10px 12px; margin-top:8px; border-radius:var(--r-sm); background:var(--surface-2); border:1.5px solid var(--border);">
          <span class="muted" style="font-size:12px;">Allocated</span>
          <span class="mono" style="font-size:13px; font-weight:800;">${money(0)} of ${money(totalTips)}</span>
        </div>
        ` : `<div class="empty-state" style="padding:14px;">No other teammates on shift right now.</div>`}
      `:''}
    </div>
    <div class="sheet-foot">
      <button class="btn btn-secondary btn-block" data-action="closeSheet">Cancel</button>
      <button class="btn btn-primary btn-block" data-action="confirmClockOut">${ICONS.check} Confirm Clock Out</button>
    </div>
  `);
}
function recalcTipOutSummary(){
  const s = STATE.currentStaff;
  const {totalTips} = shiftSalesByDept(s);
  let allocated = 0;
  $$('.tipout-amount').forEach(inp=>{ allocated += Number(inp.value)||0; });
  const summary = $('#tipout-summary');
  if(!summary) return;
  const over = allocated > totalTips + 0.001;
  summary.style.borderColor = over ? 'var(--danger)' : 'var(--border)';
  summary.querySelector('span:last-child').innerHTML = `<span style="${over?'color:var(--danger);':''}">${money(allocated)}</span> of ${money(totalTips)}`;
}
function splitTipEvenly(){
  const s = STATE.currentStaff;
  const {totalTips} = shiftSalesByDept(s);
  const checked = $$('.tipout-check:checked');
  if(!checked.length){ toast('Check off who was on shift with you first', ICONS.bell); return; }
  const already = (()=>{ let sum=0; $$('.tipout-amount').forEach(inp=>{ if(!checked.some(c=>c.dataset.recipientId===inp.dataset.recipientId)) sum += Number(inp.value)||0; }); return sum; })();
  const pool = Math.max(0, totalTips - already);
  const share = checked.length ? Math.round((pool/checked.length)*100)/100 : 0;
  checked.forEach(chk=>{
    const inp = $(`.tipout-amount[data-recipient-id="${chk.dataset.recipientId}"]`);
    if(inp) inp.value = share.toFixed(2);
  });
  recalcTipOutSummary();
}
function clearTipOuts(){
  $$('.tipout-check').forEach(c=>c.checked=false);
  $$('.tipout-amount').forEach(inp=>inp.value='');
  recalcTipOutSummary();
}
function confirmClockOut(){
  const s = STATE.currentStaff;
  const tipOutMsgs = [];
  $$('.tipout-amount').forEach(inp=>{
    const amount = Number(inp.value)||0;
    if(amount>0){
      const recipient = STATE.staff.find(m=>m.id===Number(inp.dataset.recipientId));
      if(recipient){
        STATE.tipOuts.push({id:STATE.nextUid++, from:s.name, fromId:s.id, to:recipient.name, toId:recipient.id, amount, ts:Date.now()});
        tipOutMsgs.push(money(amount)+' to '+recipient.name);
      }
    }
  });
  s.clockedIn=false;
  closeSheet();
  let msg = s.name+' clocked out';
  if(tipOutMsgs.length) msg += ' · Tipped out '+tipOutMsgs.join(', ');
  toast(msg);
  renderApp(); PineSync.push(STATE);
}

/* ============================================================
   ACTIONS (event delegation)
   ============================================================ */
const ACTIONS = {
  pinKey:(el)=>pinKey(el.dataset.key),
  logout:()=>logout(),
  goTab:(el)=>{ view=el.dataset.tab; if(view!=='order') currentOrderId=null; renderApp(); },
  openTable:(el)=>openTable(Number(el.dataset.id)),
  seatGuestsDelta:(el)=>seatGuestsDelta(Number(el.dataset.delta)),
  seatTable:(el)=>seatTable(Number(el.dataset.id)),
  openOrder:(el)=>{ currentOrderId=Number(el.dataset.id); renderApp(); },
  backToTickets:()=>{ currentOrderId=null; renderApp(); },
  startTakeout:()=>{
    showSheet(`
      <div class="sheet-head"><div class="h3">New Takeout Order</div><button class="sheet-close" data-action="closeSheet">${ICONS.close}</button></div>
      <div class="sheet-body">
        <div class="field"><label>Guest Name</label><input type="text" id="takeout-name" placeholder="e.g. Jordan Smith"></div>
        <div class="field"><label>Phone (optional)</label><input type="text" id="takeout-phone" placeholder="(206) 555-0100"></div>
      </div>
      <div class="sheet-foot">
        <button class="btn btn-secondary btn-block" data-action="closeSheet">Cancel</button>
        <button class="btn btn-primary btn-block" data-action="confirmTakeout">Start Order</button>
      </div>
    `);
  },
  confirmTakeout:()=>{
    const name = $('#takeout-name').value.trim() || 'Guest';
    const phone = $('#takeout-phone').value.trim();
    const id = STATE.nextOrderId++;
    STATE.orders[id]={id, tableId:null, server:STATE.currentStaff.name, guests:1, type:'takeout', status:'open', customerName:name, phone, items:[], openedAt:Date.now(), discount:0, tip:0};
    closeSheet();
    currentOrderId=id; renderApp(); PineSync.push(STATE);
  },
  setMenuCat:(el)=>{ activeMenuCat=el.dataset.cat; renderApp(); },
  quickAdd:(el)=>{
    const o = getOrder(currentOrderId); if(!o) return;
    addItemToOrder(o, Number(el.dataset.itemId), 1, [], '');
    renderApp(); PineSync.push(STATE);
  },
  openModifierSheet:(el)=>openModifierSheet(Number(el.dataset.itemId)),
  toggleModOpt:(el)=>toggleModOpt(el),
  modQtyDelta:(el)=>modQtyDelta(Number(el.dataset.delta)),
  confirmAddModified:(el)=>confirmAddModified(Number(el.dataset.itemId)),
  openCartSheet:()=>openCartSheet(),
  adjustQty:(el)=>adjustQty(el.dataset.uid, Number(el.dataset.delta)),
  removeItem:(el)=>removeItem(el.dataset.uid),
  sendToKitchen:()=>sendToKitchen(),
  openPaymentSheet:()=>openPaymentSheet(),
  setSplitMode:(el)=>{ payState.splitMode=el.dataset.mode; refreshPaymentSheet(); },
  splitCountDelta:(el)=>{ payState.splitCount=Math.max(1,payState.splitCount+Number(el.dataset.delta)); refreshPaymentSheet(); },
  setTip:(el)=>{
    if(el.dataset.mode==='pct'){ payState.tipMode='pct'; payState.tipPct=Number(el.dataset.val); }
    else if(el.dataset.mode==='none'){ payState.tipMode='none'; payState.tipPct=0; payState.tipAmt=0; }
    else { payState.tipMode='custom'; }
    refreshPaymentSheet();
  },
  setCustomTip:(el)=>{ payState.tipAmt=Number(el.value)||0; refreshPaymentSheet(); },
  setPayMethod:(el)=>{ payState.method=el.dataset.method; refreshPaymentSheet(); },
  completePayment:()=>completePayment(),
  setStation:(el)=>{ activeStation=el.dataset.station; renderApp(); },
  bumpItem:(el)=>bumpItem(Number(el.dataset.orderId), el.dataset.uid),
  bumpTicket:(el)=>bumpTicket(Number(el.dataset.orderId)),
  setMySalesRange:(el)=>{ mySalesRange=el.dataset.range; renderApp(); },
  openClockOut:()=>openClockOut(),
  confirmClockOut:()=>confirmClockOut(),
  splitTipEvenly:()=>splitTipEvenly(),
  clearTipOuts:()=>clearTipOuts(),
  recalcTipOutSummary:()=>recalcTipOutSummary(),
  closeSheet:()=>closeSheet(),
  stop:(el,e)=>e.stopPropagation(),
};
document.addEventListener('click', e=>{
  const el = e.target.closest('[data-action]');
  if(!el || !el.dataset.action) return;
  const fn = ACTIONS[el.dataset.action];
  if(fn) fn(el, e);
});
document.addEventListener('change', e=>{
  const el = e.target.closest('[data-change]');
  if(!el) return;
  const fn = ACTIONS[el.dataset.change];
  if(fn) fn(el, e);
});
$('#clockout-btn').addEventListener('click', ()=>openClockOut());

/* ============================================================
   INIT
   ============================================================ */
function connectionBadge(state){
  const el = $('#conn-badge');
  el.classList.toggle('offline', !state);
  el.querySelector('.conn-label').textContent = state ? 'Live' : 'Offline';
}
async function initApp(){
  try{
    const shared = await PineSync.loadState();
    PineSync.merge(STATE, shared);
  }catch(err){ console.error('[Handheld] failed to load state', err); }

  const savedId = Number(localStorage.getItem('pine-hh-staff-id'));
  if(savedId){
    const found = STATE.staff.find(s=>s.id===savedId);
    if(found) STATE.currentStaff = found;
  }

  PineSync.connect((shared)=>{
    PineSync.merge(STATE, shared);
    if(STATE.currentStaff) renderApp(); else renderLogin();
  }, {
    onConnect: ()=>connectionBadge(true),
    onDisconnect: ()=>connectionBadge(false),
  });

  if(STATE.currentStaff){
    $('#login-screen').classList.add('hidden');
    $('#app').classList.add('active');
    view = tabsForRole(STATE.currentStaff.role)[0].id;
    renderApp();
  } else {
    renderLogin();
  }
  connectionBadge(PineSync.connected);
}
initApp();
</script>
