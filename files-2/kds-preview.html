<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pine KDS — Kitchen Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Pine POS — "The Pass" Theme
   A restaurant runs on paper: tickets, chits, the rail at the
   pass. This theme is built from that material instead of a
   generic dark dashboard — warm ticket-paper surfaces, brass
   and rust ink, a serif display face with real character, and
   monospace numerals everywhere money or a ticket number shows.
   Used by the Handheld and KDS frontends (POS terminal extends
   these same tokens) so every screen in the building reads as
   one product.
   ============================================================ */
:root{
  /* ---- Paper surfaces (front-of-house: Handheld, POS) ---- */
  --bg:#EDE6D6;
  --surface:#F7F2E7;
  --surface-2:#FBF8F1;
  --surface-3:#F0E9D8;
  --border:#D9CCA8;
  --border-soft:#E4D9BB;
  --ink:#2A2113;
  --ink-soft:#6B5D44;
  --ink-faint:#9C8E70;

  --primary:#A8742B;
  --primary-dark:#8A5C1E;
  --primary-soft:rgba(168,116,43,.14);
  --on-accent:#FBF6EC;
  --teal:#3E6B4F;
  --teal-dark:#2E5039;
  --teal-soft:rgba(62,107,79,.14);

  --success:#3E7B4F;
  --success-soft:rgba(62,123,79,.14);
  --warning:#B07A1E;
  --warning-soft:rgba(176,122,30,.14);
  --danger:#B6452C;
  --danger-soft:rgba(182,69,44,.13);
  --violet:#7A5FA8;
  --violet-soft:rgba(122,95,168,.13);

  --shadow-sm:0 1px 2px rgba(40,28,10,.10);
  --shadow-md:0 10px 24px rgba(40,28,10,.14);
  --shadow-lg:0 22px 48px rgba(30,20,8,.22);

  --r-sm:3px;
  --r-md:5px;
  --r-lg:8px;
  --r-xl:14px;

  --font-display:'Fraunces',serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}

*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}
a{color:inherit;}
.hidden{display:none !important;}
:focus-visible{outline:2px solid var(--primary); outline-offset:2px;}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  border:1.5px solid transparent; border-radius:var(--r-md); padding:11px 18px;
  font-size:13.5px; font-weight:700; transition:.12s; white-space:nowrap;
  font-family:var(--font-body);
}
.btn svg{width:16px; height:16px;}
.btn-primary{background:var(--primary); color:var(--on-accent); box-shadow:0 1px 0 rgba(255,255,255,.18) inset, var(--shadow-sm);}
.btn-primary:hover{background:var(--primary-dark);}
.btn-secondary{background:var(--surface-2); color:var(--ink); border-color:var(--border);}
.btn-secondary:hover{background:var(--surface-3);}
.btn-teal{background:var(--teal); color:var(--on-accent);}
.btn-teal:hover{background:var(--teal-dark);}
.btn-danger{background:var(--danger-soft); color:var(--danger);}
.btn-danger:hover{background:var(--danger); color:var(--on-accent);}
.btn-lg{padding:14px 22px; font-size:14.5px;}
.btn-block{width:100%;}
.btn:disabled{opacity:.45; cursor:not-allowed;}

/* ---------- Badges (read like a rubber ticket stamp) ---------- */
.badge{
  display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:3px;
  font-size:11px; font-weight:700; letter-spacing:.03em; font-family:var(--font-mono);
  text-transform:uppercase; border:1px solid transparent;
}
.badge-blue{background:var(--primary-soft); color:var(--primary-dark); border-color:rgba(168,116,43,.25);}
.badge-green{background:var(--success-soft); color:var(--success); border-color:rgba(62,123,79,.25);}
.badge-red{background:var(--danger-soft); color:var(--danger); border-color:rgba(182,69,44,.25);}
.badge-amber{background:var(--warning-soft); color:var(--warning); border-color:rgba(176,122,30,.25);}
.badge-teal{background:var(--teal-soft); color:var(--teal-dark); border-color:rgba(62,107,79,.25);}
.badge-violet{background:var(--violet-soft); color:var(--violet); border-color:rgba(122,95,168,.25);}
.badge-gray{background:var(--surface-3); color:var(--ink-soft); border-color:var(--border-soft);}

/* ---------- Panels / cards ---------- */
.panel{background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--r-lg); box-shadow:var(--shadow-sm);}
.panel-pad{padding:18px;}

/* ---------- Connection badge ---------- */
.conn-badge{
  display:flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px;
  border:1px solid var(--border); background:var(--surface-2); font-size:11px; font-weight:700;
  font-family:var(--font-mono);
  color:var(--ink-soft); text-transform:uppercase; letter-spacing:.04em; transition:.15s;
}
.conn-badge .conn-dot{width:7px; height:7px; border-radius:50%; background:var(--success); box-shadow:0 0 0 3px var(--success-soft);}
.conn-badge.offline{color:var(--danger); border-color:var(--danger);}
.conn-badge.offline .conn-dot{background:var(--danger); box-shadow:0 0 0 3px var(--danger-soft); animation:connPulse 1s infinite;}
@keyframes connPulse{0%,100%{opacity:1} 50%{opacity:.3}}

/* ---------- Toasts ---------- */
#toast-root{position:fixed; bottom:20px; right:20px; z-index:700; display:flex; flex-direction:column; gap:10px; align-items:flex-end;}
.toast-msg{
  background:var(--ink); color:var(--surface-2); border:1px solid var(--ink); padding:13px 20px; border-radius:var(--r-md); font-size:13.5px; font-weight:600;
  box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:10px; animation:toastIn .25s ease;
}
.toast-msg svg{width:16px; height:16px; color:var(--teal-soft); flex-shrink:0;}
@keyframes toastIn{from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:translateY(0)}}

/* ---------- Numpad (used by Handheld login) ---------- */
.numpad{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}
.numkey{background:var(--surface-2); border:1.5px solid var(--border); border-radius:var(--r-md); color:var(--ink); font-family:var(--font-display); font-weight:600; font-size:21px; padding:16px 0; transition:.1s;}
.numkey:active{background:var(--primary-soft); border-color:var(--primary);}
.numkey.action{color:var(--ink-faint); font-size:12.5px; font-weight:600; display:flex; align-items:center; justify-content:center;}
.numkey.action svg{width:15px; height:15px;}
.pin-display{display:flex; gap:10px; justify-content:center; margin:18px 0;}
.pin-dot{width:13px; height:13px; border-radius:50%; border:2px solid var(--border);}
.pin-dot.filled{background:var(--primary); border-color:var(--primary);}
.pin-dot.error{border-color:var(--danger); background:var(--danger);}

/* ---------- Empty state ---------- */
.empty-state{padding:36px 20px; text-align:center; color:var(--ink-faint);}
.empty-state .h3{color:var(--ink-soft); margin-bottom:4px;}
.h3{font-family:var(--font-display); font-weight:600; font-size:16px;}
.muted{color:var(--ink-faint);}
.mono{font-family:var(--font-mono);}

/* ---------- Staff chip (login picker) ---------- */
.staff-chip{
  display:flex; align-items:center; gap:10px; padding:12px; border-radius:var(--r-md);
  background:var(--surface-2); border:1.5px solid var(--border); text-align:left; transition:.12s; width:100%;
}
.staff-chip.active{border-color:var(--primary); background:var(--primary-soft);}
.staff-chip .staff-avatar{width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:600; font-size:13px; color:#fff; flex-shrink:0;}
.staff-chip .name{font-weight:700; font-size:13.5px;}
.staff-chip .role{display:block; font-size:11px; font-weight:500; color:var(--ink-faint); margin-top:1px;}

/* ---------- Bottom sheet ---------- */
.sheet-overlay{position:fixed; inset:0; background:rgba(20,14,4,.45); z-index:600; display:flex; align-items:flex-end; justify-content:center;}
.sheet{
  background:var(--surface-2); border-radius:var(--r-xl) var(--r-xl) 0 0; border:1px solid var(--border-soft); border-bottom:none;
  width:100%; max-width:520px; max-height:92vh; overflow-y:auto; box-shadow:var(--shadow-lg); animation:sheetIn .2s ease;
}
@keyframes sheetIn{from{transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.sheet-head{padding:16px 18px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-soft); position:sticky; top:0; background:var(--surface-2); z-index:1;}
.sheet-body{padding:16px 18px;}
.sheet-foot{padding:14px 18px; border-top:1px solid var(--border-soft); display:flex; gap:10px; position:sticky; bottom:0; background:var(--surface-2);}
.sheet-close{width:34px; height:34px; border-radius:50%; background:var(--surface-3); border:none; color:var(--ink-soft); display:flex; align-items:center; justify-content:center;}
.sheet-close svg{width:16px; height:16px;}

/* ---------- Fields ---------- */
.field{display:flex; flex-direction:column; gap:6px; margin-bottom:12px;}
.field label{font-size:12px; font-weight:700; color:var(--ink-soft);}
.field input, .field select, .field textarea{
  background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r-sm); padding:11px 12px;
  font-size:14px; color:var(--ink); outline:none; transition:.12s;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--primary);}
.field-row{display:flex; gap:10px;}
.field-row .field{flex:1;}

/* ---------- Qty control ---------- */
.qty-btn{width:32px; height:32px; border-radius:50%; border:1.5px solid var(--border); background:var(--surface); color:var(--ink); display:flex; align-items:center; justify-content:center; transition:.1s;}
.qty-btn svg{width:14px; height:14px;}
.qty-btn:hover{border-color:var(--primary); color:var(--primary);}

/* ---------- Modifier options ---------- */
.modopt-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px;}
.modopt{background:var(--surface); color:var(--ink); border:1.5px solid var(--border); border-radius:var(--r-sm); padding:10px 12px; font-size:13px; font-weight:600; display:flex; justify-content:space-between; align-items:center; transition:.1s; text-align:left;}
.modopt.selected{border-color:var(--primary); background:var(--primary-soft); color:var(--primary-dark);}
.modopt .opt-price{font-size:11px; color:var(--ink-faint); font-family:var(--font-mono);}
.modopt.selected .opt-price{color:var(--primary-dark);}
.modgroup-title{display:flex; justify-content:space-between; align-items:center; font-size:12.5px; font-weight:700; margin-bottom:8px; color:var(--ink-soft);}
.modgroup-title .req{font-size:10.5px; color:var(--danger); font-weight:700;}

/* ---------- Tabs ---------- */
.tabbar{display:flex; gap:8px; flex-wrap:wrap;}
.tab{background:var(--surface-2); border:1.5px solid var(--border); color:var(--ink-soft); border-radius:999px; padding:9px 14px; font-size:12.5px; font-weight:700; display:flex; align-items:center; gap:6px; transition:.12s;}
.tab svg{width:14px; height:14px;}
.tab.active{background:var(--primary); border-color:var(--primary); color:var(--on-accent);}

</style>
<style>
html,body{height:100%; overflow:hidden;}
/* ---------- KDS runs dark: the line dims its screens so they don't
   wash out a kitchen at night. Override the shared paper tokens
   locally rather than changing the shared theme, since POS/Handheld
   stay on paper. ---------- */
body{
  --bg:#15130D;
  --surface:#1E1B13;
  --surface-2:#262219;
  --surface-3:#322C1F;
  --border:#433A26;
  --border-soft:#2C2719;
  --ink:#F2EAD6;
  --ink-soft:#B8AC8E;
  --ink-faint:#857A60;
  --primary:#D88A3E;
  --primary-dark:#C2761F;
  --primary-soft:rgba(216,138,62,.16);
  --teal:#5B9E78;
  --teal-dark:#477F5F;
  --teal-soft:rgba(91,158,120,.16);
  --success:#6FBE85;
  --success-soft:rgba(111,190,133,.14);
  --warning:#E0AC4E;
  --warning-soft:rgba(224,172,78,.14);
  --danger:#E0684A;
  --danger-soft:rgba(224,104,74,.16);

  font-family:var(--font-body); background:var(--bg); color:var(--ink);
}

/* ---------- Header ---------- */
.kds-app{display:flex; flex-direction:column; height:100vh;}
.kds-header{
  display:flex; align-items:center; gap:24px; padding:14px 24px;
  background:var(--surface); border-bottom:1.5px solid var(--border); flex-shrink:0;
}
.kds-brand{display:flex; align-items:center; gap:12px;}
.kds-brand .logo-badge{
  width:42px; height:42px; border-radius:6px; background:var(--primary);
  display:flex; align-items:center; justify-content:center; color:#1A1306; font-family:var(--font-display); font-weight:600; font-size:16px;
}
.kds-brand .title{font-family:var(--font-display); font-weight:600; font-size:19px;}
.kds-brand .sub{font-size:11.5px; color:var(--ink-faint); margin-top:1px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.04em;}

.kds-stations{display:flex; gap:8px; flex:1; overflow-x:auto; scrollbar-width:none;}
.kds-stations::-webkit-scrollbar{display:none;}
.kds-tab{
  background:var(--surface-2); border:1px solid var(--border); color:var(--ink-soft);
  border-radius:4px; padding:10px 18px; font-size:13px; font-weight:700; white-space:nowrap; transition:.12s;
  display:flex; align-items:center; gap:8px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.02em;
}
.kds-tab.active{background:var(--primary); border-color:var(--primary); color:#1A1306;}
.kds-tab .count{background:rgba(0,0,0,.25); border-radius:999px; padding:1px 8px; font-family:var(--font-mono); font-size:11.5px;}
.kds-tab.active .count{background:rgba(0,0,0,.3);}

.kds-right{display:flex; align-items:center; gap:14px; flex-shrink:0;}
.kds-clock{font-family:var(--font-mono); font-size:18px; font-weight:700; color:var(--ink-soft); min-width:96px; text-align:right;}
.kds-allcount{font-family:var(--font-mono); font-size:13px; color:var(--ink-faint); white-space:nowrap;}
.sound-toggle{
  display:flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:50%;
  border:1px solid var(--border); background:var(--surface-2); color:var(--ink-soft); transition:.12s;
}
.sound-toggle.on{color:var(--teal); border-color:var(--teal); background:var(--teal-soft);}
.sound-toggle svg{width:18px; height:18px;}

/* ---------- Board ---------- */
.kds-board{flex:1; overflow-y:auto; padding:22px; background-image:radial-gradient(circle at 50% 0%, rgba(216,138,62,.05), transparent 50%);}
.kds-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:20px; align-items:start;}

/* Ticket chit: a punch-hole rail down the left edge */
.kds-card{
  background:var(--surface); border-radius:var(--r-md); border:1.5px solid var(--border);
  border-left:4px solid var(--ink-faint);
  box-shadow:var(--shadow-md); overflow:hidden; display:flex; flex-direction:column;
  animation:cardIn .25s ease; position:relative;
}
.kds-card.warn{border-left-color:var(--warning);}
.kds-card.late{border-left-color:var(--danger);}
.kds-card.flash{animation:cardFlash 1.4s ease 2;}
@keyframes cardIn{from{opacity:0; transform:translateY(10px) scale(.98);} to{opacity:1; transform:translateY(0) scale(1);}}
@keyframes cardFlash{0%,100%{box-shadow:var(--shadow-md);} 50%{box-shadow:0 0 0 4px var(--primary), var(--shadow-md);}}

.kds-head{padding:14px 18px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px dashed var(--border); background:var(--surface-2);}
.kds-head .left{display:flex; flex-direction:column; gap:2px;}
.kds-head .ticket-no{font-size:11.5px; color:var(--ink-faint); font-weight:700; letter-spacing:.04em; font-family:var(--font-mono); text-transform:uppercase;}
.kds-head .table-name{font-family:var(--font-display); font-weight:600; font-size:22px;}
.kds-head .guests{font-size:12px; color:var(--ink-faint); margin-top:1px;}
.kds-timer{font-family:var(--font-mono); font-weight:800; font-size:20px; display:flex; align-items:center; gap:7px; padding:6px 12px; border-radius:4px;}
.kds-timer svg{width:16px; height:16px;}
.kds-timer.ok{color:var(--success); background:var(--success-soft);}
.kds-timer.warn{color:var(--warning); background:var(--warning-soft);}
.kds-timer.late{color:var(--danger); background:var(--danger-soft); animation:timerPulse 1s infinite;}
@keyframes timerPulse{0%,100%{opacity:1} 50%{opacity:.55}}

.kds-items{padding:14px 18px; flex:1; display:flex; flex-direction:column; gap:14px;}
.kds-item{font-size:15.5px; display:flex; gap:12px; align-items:flex-start;}
.kds-item .qtytag{font-family:var(--font-mono); font-weight:800; color:var(--primary); flex-shrink:0; font-size:17px; min-width:30px;}
.kds-item .body{flex:1;}
.kds-item .name{font-weight:700;}
.kds-item .mods{font-size:13px; color:var(--ink-faint); margin-top:3px; line-height:1.5;}
.kds-item .notes{font-size:13px; color:var(--danger); font-weight:800; margin-top:3px; text-transform:uppercase; letter-spacing:.02em;}
.kds-item.ready .body{text-decoration:line-through; opacity:.45;}
.kds-item .bump-btn{
  background:var(--surface-3); border:1.5px solid var(--border); color:var(--ink);
  border-radius:var(--r-sm); padding:8px 14px; font-weight:700; font-size:13px; flex-shrink:0; transition:.1s;
}
.kds-item .bump-btn:hover{border-color:var(--teal); color:var(--teal);}
.kds-item .ready-badge{
  background:var(--success-soft); color:var(--success); border-radius:var(--r-sm); padding:8px 14px;
  font-weight:700; font-size:13px; flex-shrink:0; display:flex; align-items:center; gap:6px;
}
.kds-item .ready-badge svg{width:14px; height:14px;}

.kds-foot{padding:14px 18px; border-top:1px solid var(--border-soft); display:flex; gap:10px;}
.kds-foot .btn{font-size:14.5px; padding:13px 0; flex:1;}

/* ---------- All caught up ---------- */
.kds-empty{
  display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;
  color:var(--ink-faint); text-align:center; gap:12px;
}
.kds-empty svg{width:64px; height:64px; opacity:.4;}
.kds-empty .h3{font-size:22px; color:var(--ink-soft); font-family:var(--font-display); font-weight:600;}

/* ---------- Loading ---------- */
#kds-loading{display:flex; align-items:center; justify-content:center; height:100vh; color:var(--ink-faint); font-size:14px; background:var(--bg);}
</style>
</head>
<body>

<div id="kds-loading">Connecting to Pine server…</div>

<div class="kds-app hidden" id="kds-app">
  <header class="kds-header">
    <div class="kds-brand">
      <div class="logo-badge">P</div>
      <div>
        <div class="title">Kitchen Display</div>
        <div class="sub" id="kds-restaurant"></div>
      </div>
    </div>
    <div class="kds-stations" id="kds-stations"></div>
    <div class="kds-right">
      <button class="sound-toggle" id="sound-toggle" title="Toggle ticket alert sound"></button>
      <div class="conn-badge" id="conn-badge"><span class="conn-dot"></span><span class="conn-label">Live</span></div>
      <div class="kds-allcount" id="kds-allcount"></div>
      <div class="kds-clock" id="kds-clock"></div>
    </div>
  </header>
  <main class="kds-board">
    <div class="kds-grid" id="kds-grid"></div>
  </main>
</div>

  card:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2.5"/><line x1="2" y1="10" x2="22" y2="10"/></svg>',
  cash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="3"/><line x1="6" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="18" y2="12"/></svg>',

  printer:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V3h12v6"/><rect x="4" y="9" width="16" height="8" rx="1.5"/><path d="M6 17v4h12v-4"/></svg>',
  alert:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.86 1.8 18a1 1 0 0 0 .9 1.5h18.6a1 1 0 0 0 .9-1.5L13.7 3.86a1 1 0 0 0-1.74 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12" y2="17"/></svg>',
  star:'<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2.5l2.9 6 6.6.9-4.8 4.6 1.2 6.5L12 17.3 6.1 20.5l1.2-6.5L2.5 9.4l6.6-.9Z"/></svg>',
  gift:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="1.5"/><path d="M12 8v13"/><path d="M3 12h18"/><path d="M12 8c-2.5 0-4-1.3-4-3a2.5 2.5 0 0 1 4-2c1 0 1.6.6 2 1.5"/><path d="M12 8c2.5 0 4-1.3 4-3a2.5 2.5 0 0 0-4-2c-1 0-1.6.6-2 1.5"/></svg>',
  fire:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c1.5 3 .5 4.5 2 6 2 2 3 4 3 6.5A5 5 0 0 1 7 14.5C7 11 9.5 9.5 9.5 7c1.5 1.5 1.5 3 1 4 1-.5 1.5-2 1.5-4Z"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></svg>',
  receipt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h12v19l-2.5-1.5L13 21l-2.5-1.5L8 21l-2-1.5Z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/></svg>',
  hold:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>',
  send:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>',
  tag:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.6 12.4 12.4 4.2a2 2 0 0 0-1.4-.6H5a2 2 0 0 0-2 2v6a2 2 0 0 0 .6 1.4l8.2 8.2a2 2 0 0 0 2.8 0l6-6a2 2 0 0 0 0-2.8Z"/><circle cx="8.5" cy="8.5" r="1.5"/></svg>',
  globe:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="3" y1="12" x2="21" y2="12"/><path d="M12 3a14 14 0 0 1 0 18"/><path d="M12 3a14 14 0 0 0 0 18"/></svg>',
  filter:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.5 10 19 14 21 14 12.5 22 3"/></svg>',
  user:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-3.9 3.6-7 8-7s8 3.1 8 7"/></svg>',
  box:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8 12 3 3 8v8l9 5 9-5V8Z"/><path d="M3 8l9 5 9-5"/><line x1="12" y1="13" x2="12" y2="21"/></svg>',
};

</script>
<script>
const $ = (sel,el=document)=>el.querySelector(sel);
const $$ = (sel,el=document)=>[...el.querySelectorAll(sel)];

let STATE = { menu:{categories:[],items:[]}, orders:{}, tables:[], restaurant:{name:''} };
let activeStation = 'All';
let soundOn = false;
let knownTicketIds = new Set();
let firstRender = true;

/* ---------- helpers (mirrors POS terminal logic) ---------- */
function getTable(id){ return STATE.tables.find(t=>t.id===id); }
function tableLabel(id){ const t=getTable(id); return t? t.number : ''; }
function fmtClock(){ return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'}); }

function toast(msg, icon=ICONS.checkCircle){
  const root = $('#toast-root');
  const el = document.createElement('div');
  el.className='toast-msg';
  el.innerHTML = icon + '<span>'+msg+'</span>';
  root.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(8px)'; el.style.transition='.25s'; setTimeout(()=>el.remove(),250); }, 2600);
}

/* ---------- sound ---------- */
let audioCtx = null;
function playBeep(){
  if(!soundOn) return;
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.22, audioCtx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.35);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+0.35);
    setTimeout(()=>{
      const o2 = audioCtx.createOscillator(); const g2 = audioCtx.createGain();
      o2.type='sine'; o2.frequency.value=1180;
      g2.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.22, audioCtx.currentTime+0.01);
      g2.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.3);
      o2.connect(g2); g2.connect(audioCtx.destination);
      o2.start(); o2.stop(audioCtx.currentTime+0.3);
    }, 140);
  }catch(e){}
}

/* ---------- rendering ---------- */
function buildTickets(){
  let tickets = Object.values(STATE.orders)
    .filter(o=>o.status==='open' && o.items.some(it=>it.status==='fired'||it.status==='ready'))
    .map(o=>{
      const items = o.items.filter(it=>(it.status==='fired'||it.status==='ready') && (activeStation==='All'||it.station===activeStation));
      const fired = o.items.filter(it=>it.firedAt).map(it=>it.firedAt);
      return {order:o, items, earliestFired: fired.length?Math.min(...fired):Date.now()};
    })
    .filter(t=>t.items.length>0);
  tickets.sort((a,b)=>a.earliestFired-b.earliestFired);
  return tickets;
}

function renderStations(){
  const stations = ['All', ...new Set(STATE.menu.categories.map(c=>c.station))];
  const counts = {};
  stations.forEach(s=>counts[s]=0);
  Object.values(STATE.orders).forEach(o=>{
    if(o.status!=='open') return;
    o.items.forEach(it=>{
      if(it.status!=='fired' && it.status!=='ready') return;
      counts['All']++;
      counts[it.station] = (counts[it.station]||0)+1;
    });
  });
  $('#kds-stations').innerHTML = stations.map(s=>`
    <button class="kds-tab ${activeStation===s?'active':''}" data-station="${s}">
      ${s} <span class="count">${counts[s]||0}</span>
    </button>
  `).join('');
  $$('#kds-stations .kds-tab').forEach(btn=>{
    btn.addEventListener('click', ()=>{ activeStation = btn.dataset.station; render(); });
  });
}

function ticketCardHtml(t){
  const o = t.order;
  const mins = Math.floor((Date.now()-t.earliestFired)/60000);
  let urgency='ok';
  if(mins>=12) urgency='late'; else if(mins>=8) urgency='warn';
  const label = o.tableId? 'Table '+tableLabel(o.tableId) : (o.type==='takeout'?'Takeout · '+(o.customerName||'Guest') : 'Order #'+o.id);
  return `<div class="kds-card ${urgency!=='ok'?urgency:''}" data-order-id="${o.id}">
    <div class="kds-head">
      <div class="left">
        <div class="ticket-no">#${o.id} · ${o.type==='takeout'?'TAKEOUT':(o.server||'').split(' ')[0]}</div>
        <div class="table-name">${label}</div>
        ${o.guests?`<div class="guests">${o.guests} guest${o.guests===1?'':'s'}</div>`:''}
      </div>
      <div class="kds-timer ${urgency}">${ICONS.clock} ${mins}m</div>
    </div>
    <div class="kds-items">
      ${t.items.map(it=>{
        const modsText = it.mods.map(m=>m.name).join(', ');
        return `<div class="kds-item ${it.status==='ready'?'ready':''}">
          <div class="qtytag">${it.qty}×</div>
          <div class="body">
            <div class="name">${it.name}</div>
            ${modsText?`<div class="mods">${modsText}</div>`:''}
            ${it.notes?`<div class="notes">${it.notes}</div>`:''}
          </div>
          ${it.status==='fired'
            ? `<button class="bump-btn" data-action="bumpItem" data-order-id="${o.id}" data-uid="${it.uid}">Ready</button>`
            : `<span class="ready-badge">${ICONS.checkCircle} Ready</span>`}
        </div>`;
      }).join('')}
    </div>
    <div class="kds-foot">
      <button class="btn btn-teal" data-action="bumpTicket" data-order-id="${o.id}">${ICONS.check} Bump All &amp; Serve</button>
    </div>
  </div>`;
}

function render(){
  renderStations();
  $('#kds-restaurant').textContent = STATE.restaurant.name || '';
  const tickets = buildTickets();
  const grid = $('#kds-grid');

  const allOpenCount = Object.values(STATE.orders).filter(o=>o.status==='open' && o.items.some(it=>it.status==='fired'||it.status==='ready')).length;
  $('#kds-allcount').textContent = `${allOpenCount} active ticket${allOpenCount===1?'':'s'}`;

  if(!tickets.length){
    grid.parentElement.innerHTML = `<div class="kds-empty">${ICONS.kitchen}<div class="h3">All caught up</div><div>No tickets waiting${activeStation==='All'?'':' on '+activeStation}.</div></div>`;
    return;
  }
  if(!grid.isConnected){
    // empty-state replaced the board's innerHTML — rebuild the grid container
    $('.kds-board').innerHTML = '<div class="kds-grid" id="kds-grid"></div>';
  }
  const liveGrid = $('#kds-grid');
  liveGrid.innerHTML = tickets.map(t=>ticketCardHtml(t)).join('');

  // Flash + beep for brand-new tickets
  const currentIds = new Set(tickets.map(t=>t.order.id));
  if(!firstRender){
    currentIds.forEach(id=>{
      if(!knownTicketIds.has(id)){
        const card = liveGrid.querySelector(`.kds-card[data-order-id="${id}"]`);
        if(card) card.classList.add('flash');
        playBeep();
        toast('New ticket #'+id, ICONS.bell);
      }
    });
  }
  knownTicketIds = currentIds;
  firstRender = false;

  // Wire up bump actions
  $$('[data-action="bumpItem"]', liveGrid).forEach(btn=>{
    btn.addEventListener('click', ()=>bumpItem(Number(btn.dataset.orderId), btn.dataset.uid));
  });
  $$('[data-action="bumpTicket"]', liveGrid).forEach(btn=>{
    btn.addEventListener('click', ()=>bumpTicket(Number(btn.dataset.orderId)));
  });
}

function bumpItem(orderId, uid){
  const o = STATE.orders[orderId];
  if(!o) return;
  const it = o.items.find(i=>i.uid===uid);
  if(it) it.status='ready';
  render();
  PineSync.push(STATE);
}
function bumpTicket(orderId){
  const o = STATE.orders[orderId];
  if(!o) return;
  o.items.forEach(it=>{ if(it.status==='fired'||it.status==='ready') it.status='served'; });
  toast('Ticket #'+orderId+' bumped and served');
  knownTicketIds.delete(orderId);
  render();
  PineSync.push(STATE);
}

/* ---------- clock + ticket-age refresh ---------- */
function tick(){ $('#kds-clock').textContent = fmtClock(); }
setInterval(tick, 1000);
setInterval(render, 15000); // keep ticket ages fresh even with no new events

/* ---------- sound toggle ---------- */
$('#sound-toggle').innerHTML = ICONS.bell;
$('#sound-toggle').addEventListener('click', ()=>{
  soundOn = !soundOn;
  $('#sound-toggle').classList.toggle('on', soundOn);
  if(soundOn){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
    toast('Ticket alert sound on');
  } else {
    toast('Ticket alert sound off');
  }
});

/* ---------- connection badge ---------- */
function connectionBadge(state){
  const el = $('#conn-badge');
  el.classList.toggle('offline', !state);
  el.querySelector('.conn-label').textContent = state ? 'Live' : 'Offline';
}

/* ---------- init ---------- */
async function initApp(){
  try{
    const shared = await PineSync.loadState();
    Object.assign(STATE, shared);
  }catch(err){
    console.error('[KDS] failed to load state', err);
  }
  $('#kds-loading').classList.add('hidden');
  $('#kds-app').classList.remove('hidden');
  tick();
  render();

  PineSync.connect((shared)=>{
    Object.assign(STATE, shared);
    render();
  }, {
    onConnect: ()=>connectionBadge(true),
    onDisconnect: ()=>connectionBadge(false),
  });
  connectionBadge(PineSync.connected);
}
initApp();
</script>
</body>
